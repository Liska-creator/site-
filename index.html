<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPA Boxes Menu</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial;
        background: #1a1a1a;
        color: white;
      }
      .navbar {
        display: flex;
        align-items: center;
        padding: 10px 20px;
        background: #1a1a1a;
        border-bottom: 2px solid #444;
      }
      .nav-left {
        display: flex;
        gap: 20px;
      }
      .nav-link {
        color: white;
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
      }
      .nav-link:hover {
        background: #333;
      }
      .main-content {
        display: flex;
        padding: 20px;
        grid-template-columns: repeat(5, 1fr);
        gap: 20px;
      }
      .box {
        box-sizing: 0;
        justify-content: center;
        background: #2a2a2a;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        height: 400px;
        width: 400px; /* ფიქსირებული სიგანე */
      }
      .box-name {
        padding: 8px;
        text-align: center;
      }
      .box img {
        width: 100%;
        height: 100%;
      }
      .content-box {
        padding: 20px;
        background: #222;
        border-radius: 8px;
        margin-top: 20px;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 15px;
        color: #fff;
        text-decoration: none;
        padding: 5px 10px;
        border: 1px solid #444;
        border-radius: 4px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .back-link:hover {
        background: #333;
      }

      .openedPage {
        width: 100%;
        border: 2px solid red;
      }

      
      .openedPageName {
        width: 100%;
        border:2px solid green;
        font-size: 25px;
        text-align: center;
      }

    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <a class="nav-link" onclick="showFilms()">Filmss</a>
        <a class="nav-link" onclick="showLive()">Live</a>
      </div>
    </nav>

    <main class="main-content" id="content"></main>

    <script>
      // DATA
      const films = [
        {
          id: "film1",
          name: "Avatar",
          img: "https://m.media-amazon.com/images/M/MV5BZmQzMTMwOTItYjUyMS00NDY4LThmOWEtZjE3ODkyMzg3MDdlXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg",
          desc: "Avatar description.",
        },
        {
          id: "film2",
          name: "Titanic",
          img: "https://inreviewonline.com/wp-content/uploads/2026/02/the-bluff.png",
          desc: "Titanic description.",
        },
        {
          id: "film3",
          name: "Joker",
          img: "https://picsum.photos/400/300?3",
          desc: "Joker description.",
        },
        {
          id: "film4",
          name: "Inception",
          img: "https://picsum.photos/400/300?4",
          desc: "Inception description.",
        },
        {
          id: "film5",
          name: "Interstellar",
          img: "https://picsum.photos/400/300?5",
          desc: "Interstellar description.",
        },
      ];

      const live = [
        {
          id: "live1",
          name: "BBC News",
          img: "https://picsum.photos/400/300?6",
          desc: "BBC live info.",
        },
        {
          id: "live2",
          name: "Discovery",
          img: "https://picsum.photos/400/300?7",
          desc: "Discovery live info.",
        },
        {
          id: "live3",
          name: "NatGeo",
          img: "https://picsum.photos/400/300?8",
          desc: "NatGeo live info.",
        },
        {
          id: "live4",
          name: "Animal Planet",
          img: "https://picsum.photos/400/300?9",
          desc: "Animal Planet live info.",
        },
        {
          id: "live5",
          name: "History",
          img: "https://picsum.photos/400/300?10",
          desc: "History live info.",
        },
      ];

      // RENDER FUNCTIONS
      function showFilms() {
        renderBoxes(films);
      }
      function showLive() {
        renderBoxes(live);
      }

      function renderBoxes(data) {
        let html = "";
        data.forEach((box) => {
          html += `
  
              <a class="box" onclick="openBox('${box.id}')">
        <div class="box-name">${box.name}</div>
        <img src="${box.img}">
      </a>`;
        });
        document.getElementById("content").innerHTML = html;
      }

      function openBox(id) {
        let item =
          films.find((b) => b.id === id) || live.find((b) => b.id === id);
        if (!item) return;
        document.getElementById("content").innerHTML = `
        <span class="back-link" onclick="goBack('${item.id.startsWith("film") ? "films" : "live"}')">&larr; Back</span>
        <div class="openedPage">
          <div class="openedPageName">${item.name}</div>
          <div class=openedPageCont">
            <div class="openedPageBox">
              <div class="openedPageBoxName"></div>
              <div class="openedPageBoxImg"></div>  
              <div class="openedPageBoxLinks">
                <a></a>
                <a></a>
                <a></a>
              </div>  
            </div>  
          </div>
        </div>
    
  `;
      }

      function goBack(page) {
        if (page === "films") showFilms();
        else showLive();
      }

      // default
      showFilms();
    </script>
  </body>
</html>
