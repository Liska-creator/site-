<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPA Boxes Menu</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #1a1a1a; color: white; }
    .navbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; padding: 10px 20px; background: #1a1a1a; border-bottom: 2px solid #444; }
    .nav-left { display: flex; flex-wrap: wrap; gap: 15px; }
    .nav-link { color: white; text-decoration: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    .nav-link:hover { background: #333; }
    .main-content { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
    .box, .openedPageBox { background: #2a2a2a; border-radius: 8px; overflow: hidden; flex: 1 1 300px; max-width: 360px; min-width: 200px; display: flex; flex-direction: column; height: 400px; position: relative; }
    .box { cursor: pointer; }
    .box-name, .openedPageBoxName { padding: 8px 10px; text-align: center; white-space: nowrap; text-overflow: ellipsis; background: #2a2a2a; z-index: 1; }
    .box img, .openedPageBox img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
    .openedPage { width: 100%; }
    .openedPageName { font-size: 30px; padding-bottom: 20px; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #444; }
    .openedPageCont { display: flex; flex-wrap: wrap; gap: 20px; max-height: calc(100vh - 200px); overflow-y: auto; padding: 20px; justify-content: center; }
    .openedPageBoxLink { position: absolute; bottom: 0; right: 0; padding: 5px; background: rgba(0, 0, 0, 0.5); }
    .openedPageBoxLink a { color: red; text-decoration: none; display: block; margin-bottom: 5px; font-size: 28px;}
    .back-link { display: inline-block; margin-bottom: 15px; color: #fff; text-decoration: none; padding: 5px 10px; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
    .back-link:hover { background: #333; }
    @media (max-width: 1024px) { .box, .openedPageBox { flex: 1 1 45%; } }
    @media (max-width: 768px) { .navbar { flex-direction: column; align-items: flex-start; } .box, .openedPageBox { flex: 1 1 48%; } }
    @media (max-width: 480px) { .box, .openedPageBox { flex: 1 1 95%; } .openedPageName { font-size: 24px; } .main-content { padding: 10px; gap: 15px; } .nav-left { gap: 10px; } }
  </style>
</head>
<body>

<!-- https://liska-creator.github.io/site- -->
  <nav class="navbar">
    <div class="nav-left">
      <a class="nav-link" onclick="showFilms()">Films</a>
      <a class="nav-link" onclick="showLive()">Live</a>
    </div>
  </nav>

  <main class="main-content" id="content"></main>
  <!-- მონაცემების ფაილები -->
  <script src="films.js"></script>
  <script src="live.js"></script>

  <script>
    // JS ლოგიკა
    function showFilms() {
      renderBoxes(films);
    }

    function showLive() {
      renderBoxes(live);
    }

    function renderBoxes(data) {
      let html = "";
      data.forEach(box => {
        html += `
<a class="box" onclick="openBox('${box.id}')">
  <div class="box-name">${box.name}</div>
  <img src="${box.img}">
</a>`;
      });
      document.getElementById("content").innerHTML = html;
    }

    function openBox(id) {
      let item = films.find(b => b.id === id) || live.find(b => b.id === id);
      if (!item) return;

      let subItems = item.items || []; // შვილები პირდაპირ იმ ობიექტში
      let subHtml = "";

      subItems.forEach(sub => {
        subHtml += `
<div class="openedPageBox">
  <div class="openedPageBoxName">${sub.name}</div>
  <img src="${sub.img}">
  <div class="openedPageBoxLink">
    <a href="${sub.link1 || '#'}">1</a>
    <a href="${sub.link2 || '#'}">2</a>
    <a href="${sub.link3 || '#'}">3</a>
  </div>
</div>`;
      });

      document.getElementById("content").innerHTML = `
<span class="back-link" onclick="goBack('${item.id.startsWith('film') ? 'films' : 'live'}')">← Back</span>
<div class="openedPage">
  <div class="openedPageName">${item.name}</div>
  <div class="openedPageCont">${subHtml}</div>
</div>`;
    }

    function goBack(page) {
      if (page === "films") showFilms();
      else showLive();
    }

    // Default
    showFilms();
  </script>
</body>

</html>
